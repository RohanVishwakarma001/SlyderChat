<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                        "on-tertiary-fixed": "#380d00",
                        "surface-bright": "#faf9fe",
                        "on-primary-fixed-variant": "#005322",
                        "error": "#ba1a1a",
                        "primary-container": "#25d366",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f1f0f5",
                        "tertiary": "#93492e",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e3e2e7",
                        "secondary-fixed-dim": "#8cd4c7",
                        "on-tertiary-container": "#78351b",
                        "on-background": "#1a1b1f",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",

                    "spacing": {
                        "inset-card": "12px",

                        "header-height-collapsed": "44px",

<style>
        body {
            background-color: #faf9fe;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow: hidden;
        }
        .ios-numpad {
            background: rgba(210, 213, 219, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .numpad-key {
            background: #ffffff;
            box-shadow: 0 1px 0 rgba(0,0,0,0.3);
            transition: background 0.1s;
        }
        .numpad-key:active {
            background: #d1d1d6;
        }
        .separator {
            height: 0.5px;
            background-color: rgba(60, 74, 61, 0.2);
        }
        .glass-header {
            background: rgba(250, 249, 254, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="flex flex-col h-screen font-body text-on-surface">
<!-- Top Navigation Bar -->
<header class="sticky top-0 w-full z-50 flex items-center justify-between px-margin-edge pt-12 pb-2 glass-header border-b-[0.5px] border-outline-variant/30">
<div class="flex-1"></div>
<h1 class="font-headline text-headline flex-1 text-center text-on-surface">Phone number</h1>
<div class="flex-1 text-right">
<button class="font-headline text-headline text-primary-container font-semibold hover:opacity-70 transition-opacity active:scale-95 duration-100">
                Next
            </button>
</div>
</header>
<!-- Content Canvas -->
<main class="flex-1 px-margin-edge pt-8 animate-enter">
<div class="max-w-md mx-auto space-y-6">
<p class="text-center font-subheadline text-subheadline text-on-surface px-4">
                SlyderChat will need to verify your phone number. <span class="text-primary-container font-medium">What's my number?</span>
</p>
<!-- Input Group Container (iOS Styled) -->
<div class="bg-surface-container-lowest rounded-xl overflow-hidden border-[0.5px] border-outline-variant/30 shadow-sm">
<!-- Country Picker -->
<button class="w-full flex items-center justify-between px-4 py-3 hover:bg-surface-container-low transition-colors active:bg-surface-variant group">
<span class="text-primary-container font-subheadline text-subheadline">India</span>
<span class="material-symbols-outlined text-outline-variant group-active:translate-x-1 transition-transform">chevron_right</span>
</button>
<div class="separator ml-4"></div>
<!-- Number Input Field -->
<div class="flex items-center px-4 py-3">
<div class="flex items-center gap-2 pr-4 border-r-[0.5px] border-outline-variant/30">
<span class="text-on-surface-variant font-body text-body">+</span>
<input class="w-8 bg-transparent border-none p-0 focus:ring-0 font-body text-body text-on-surface" readonly="" type="text" value="91"/>
</div>
<div class="pl-4 flex-1">
<input autofocus="" class="w-full bg-transparent border-none p-0 focus:ring-0 font-body text-body text-on-surface placeholder:text-outline-variant" id="phone-input" placeholder="phone number" type="text"/>
</div>
</div>
</div>
<!-- Verification Info -->
<p class="text-center font-caption text-caption text-on-surface-variant px-8">
                Carrier charges may apply
            </p>
</div>
</main>
<!-- iOS Number Pad -->
<div class="ios-numpad w-full pb-safe pt-2 px-2 select-none">
<div class="grid grid-cols-3 gap-1.5 max-w-lg mx-auto">
<!-- Row 1 -->
<button class="numpad-key h-[46px] rounded-lg flex flex-col items-center justify-center" onclick="tapKey('1')">
<span class="text-[25px] leading-none font-normal">1</span>
<span class="text-[10px] font-bold opacity-0">.</span>
</button>
<button class="numpad-key h-[46px] rounded-lg flex flex-col items-center justify-center" onclick="tapKey('2')">
<span class="text-[25px] leading-none font-normal">2</span>
<span class="text-[10px] font-bold tracking-widest -mt-1">ABC</span>
</button>
<button class="numpad-key h-[46px] rounded-lg flex flex-col items-center justify-center" onclick="tapKey('3')">
<span class="text-[25px] leading-none font-normal">3</span>
<span class="text-[10px] font-bold tracking-widest -mt-1">DEF</span>
</button>
<!-- Row 2 -->
<button class="numpad-key h-[46px] rounded-lg flex flex-col items-center justify-center" onclick="tapKey('4')">
<span class="text-[25px] leading-none font-normal">4</span>
<span class="text-[10px] font-bold tracking-widest -mt-1">GHI</span>
</button>
<button class="numpad-key h-[46px] rounded-lg flex flex-col items-center justify-center" onclick="tapKey('5')">
<span class="text-[25px] leading-none font-normal">5</span>
<span class="text-[10px] font-bold tracking-widest -mt-1">JKL</span>
</button>
<button class="numpad-key h-[46px] rounded-lg flex flex-col items-center justify-center" onclick="tapKey('6')">
<span class="text-[25px] leading-none font-normal">6</span>
<span class="text-[10px] font-bold tracking-widest -mt-1">MNO</span>
</button>
<!-- Row 3 -->
<button class="numpad-key h-[46px] rounded-lg flex flex-col items-center justify-center" onclick="tapKey('7')">
<span class="text-[25px] leading-none font-normal">7</span>
<span class="text-[10px] font-bold tracking-widest -mt-1">PQRS</span>
</button>
<button class="numpad-key h-[46px] rounded-lg flex flex-col items-center justify-center" onclick="tapKey('8')">
<span class="text-[25px] leading-none font-normal">8</span>
<span class="text-[10px] font-bold tracking-widest -mt-1">TUV</span>
</button>
<button class="numpad-key h-[46px] rounded-lg flex flex-col items-center justify-center" onclick="tapKey('9')">
<span class="text-[25px] leading-none font-normal">9</span>
<span class="text-[10px] font-bold tracking-widest -mt-1">WXYZ</span>
</button>
<!-- Row 4 -->
<button class="h-[46px] rounded-lg flex items-center justify-center bg-transparent">
<!-- Empty Space -->
</button>
<button class="numpad-key h-[46px] rounded-lg flex items-center justify-center" onclick="tapKey('0')">
<span class="text-[25px] leading-none font-normal">0</span>
</button>
<button class="h-[46px] rounded-lg flex items-center justify-center active:bg-white/30 transition-colors" onclick="backspace()">
<span class="material-symbols-outlined text-[24px]">backspace</span>
</button>
</div>
<!-- Home Indicator -->
<div class="flex justify-center mt-3 pb-2">
<div class="w-32 h-1 bg-on-background/20 rounded-full"></div>
</div>
</div>
<script>
        const phoneInput = document.getElementById('phone-input');

        function tapKey(num) {
            phoneInput.value += num;
            formatInput();
            
            // Haptic simulation logic could go here
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        function backspace() {
            phoneInput.value = phoneInput.value.slice(0, -1);
            formatInput();
        }

        function formatInput() {
            // Basic formatting logic for display (e.g., 12345 67890)
            let raw = phoneInput.value.replace(/\s+/g, '');
            if (raw.length > 5) {
                phoneInput.value = raw.slice(0, 5) + ' ' + raw.slice(5, 10);
            } else {
                phoneInput.value = raw;
            }
        }

        // Prevent real keyboard from popping up but keep the focus styling
        phoneInput.addEventListener('mousedown', (e) => {
            e.preventDefault();
            phoneInput.focus();
        });
    </script>
</body></html>
