<script>
        // Simple micro-interaction for rows
        document.querySelectorAll('.list-separator').forEach(row => {
            row.addEventListener('touchstart', () => {
                row.classList.add('bg-surface-variant/30');
            });
            row.addEventListener('touchend', () => {
                row.classList.remove('bg-surface-variant/30');
            });
        });

        // Hide header elements on scroll like native iOS
        const header = document.querySelector('header');
        const main = document.querySelector('main');
        let lastScrollY = 0;

        main.addEventListener('scroll', () => {
            const currentScrollY = main.scrollTop;
            if (currentScrollY > 50) {
                // Simplified logic: could implement more complex title shrinking here
            }
            lastScrollY = currentScrollY;
        });
