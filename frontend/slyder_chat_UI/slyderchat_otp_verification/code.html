<!DOCTYPE html>

                        "tertiary": "#93492e",
                        "surface": "#faf9fe",

                        "tertiary-fixed-dim": "#ffb59b",

<style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .otp-input-dash {
            width: 32px;
            height: 2px;
            background-color: #bbcbb9;
            margin: 0 4px;
        }
        .keypad-button:active {
            background-color: #d1d1d6;
        }
        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface overflow-hidden h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 w-full z-40 bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 flex items-center justify-between px-4 h-11">
<button class="flex items-center text-primary active:opacity-50 transition-opacity">
<span class="material-symbols-outlined text-[24px]">chevron_left</span>
<span class="font-body text-body">Back</span>
</button>
<h1 class="font-headline text-headline text-on-surface absolute left-1/2 -translate-x-1/2">Verify Number</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin-edge pt-12 flex flex-col items-center text-center">
<!-- Logo Icon -->
<div class="w-16 h-16 rounded-2xl bg-primary-container flex items-center justify-center mb-6 shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-[40px]" style="font-variation-settings: 'FILL' 1;">chat</span>
</div>
<!-- Headline & Instructions -->
<h2 class="font-large-title text-large-title-mobile text-on-surface mb-2">Verification</h2>
<p class="font-body text-body text-on-surface-variant max-w-[280px] mb-8">
            Waiting to automatically detect an SMS sent to <span class="font-headline text-on-surface">+1 (555) 000-0000</span>. <button class="text-primary font-body">Wrong number?</button>
</p>
<!-- OTP Input Area -->
<div class="flex items-center justify-center gap-2 mb-12" id="otp-display">
<!-- 6 Digit Visual Slots -->
<div class="flex flex-col items-center">
<span class="text-[32px] font-medium h-10 w-8 flex items-center justify-center" id="digit-0"></span>
<div class="otp-input-dash"></div>
</div>
<div class="flex flex-col items-center">
<span class="text-[32px] font-medium h-10 w-8 flex items-center justify-center" id="digit-1"></span>
<div class="otp-input-dash"></div>
</div>
<div class="flex flex-col items-center">
<span class="text-[32px] font-medium h-10 w-8 flex items-center justify-center" id="digit-2"></span>
<div class="otp-input-dash"></div>
</div>
<span class="mx-2 text-outline-variant">—</span>
<div class="flex flex-col items-center">
<span class="text-[32px] font-medium h-10 w-8 flex items-center justify-center" id="digit-3"></span>
<div class="otp-input-dash"></div>
</div>
<div class="flex flex-col items-center">
<span class="text-[32px] font-medium h-10 w-8 flex items-center justify-center" id="digit-4"></span>
<div class="otp-input-dash"></div>
</div>
<div class="flex flex-col items-center">
<span class="text-[32px] font-medium h-10 w-8 flex items-center justify-center" id="digit-5"></span>
<div class="otp-input-dash"></div>
</div>
</div>
<p class="font-subheadline text-subheadline text-on-surface-variant mb-10">Enter 6-digit code</p>
<!-- Action Options -->
<div class="w-full max-w-sm space-y-4 px-4">
<button class="w-full flex items-center justify-between py-3 border-b border-outline-variant/20 active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">sms</span>
<span class="font-body text-body text-on-surface">Resend SMS</span>
</div>
<span class="font-body text-body text-on-surface-variant">1:54</span>
</button>
<button class="w-full flex items-center justify-between py-3 active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">call</span>
<span class="font-body text-body text-on-surface">Call Me</span>
</div>
<span class="font-body text-body text-on-surface-variant">in 2:00</span>
</button>
</div>
</main>
<!-- iOS Styled Number Pad -->
<section class="bg-[#D1D3D9] pt-1 pb-safe safe-area-bottom w-full mt-auto">
<div class="grid grid-cols-3 gap-1.5 p-1.5">
<!-- Row 1 -->
<button class="keypad-button h-[46px] bg-white rounded-lg flex flex-col items-center justify-center shadow-[0_1px_0_0_rgba(0,0,0,0.3)] transition-colors" onclick="appendDigit('1')">
<span class="text-[25px] leading-none">1</span>
<span class="text-[10px] font-bold text-gray-500 opacity-0">.</span>
</button>
<button class="keypad-button h-[46px] bg-white rounded-lg flex flex-col items-center justify-center shadow-[0_1px_0_0_rgba(0,0,0,0.3)] transition-colors" onclick="appendDigit('2')">
<span class="text-[25px] leading-none">2</span>
<span class="text-[10px] font-bold text-gray-500 uppercase">abc</span>
</button>
<button class="keypad-button h-[46px] bg-white rounded-lg flex flex-col items-center justify-center shadow-[0_1px_0_0_rgba(0,0,0,0.3)] transition-colors" onclick="appendDigit('3')">
<span class="text-[25px] leading-none">3</span>
<span class="text-[10px] font-bold text-gray-500 uppercase">def</span>
</button>
<!-- Row 2 -->
<button class="keypad-button h-[46px] bg-white rounded-lg flex flex-col items-center justify-center shadow-[0_1px_0_0_rgba(0,0,0,0.3)] transition-colors" onclick="appendDigit('4')">
<span class="text-[25px] leading-none">4</span>
<span class="text-[10px] font-bold text-gray-500 uppercase">ghi</span>
</button>
<button class="keypad-button h-[46px] bg-white rounded-lg flex flex-col items-center justify-center shadow-[0_1px_0_0_rgba(0,0,0,0.3)] transition-colors" onclick="appendDigit('5')">
<span class="text-[25px] leading-none">5</span>
<span class="text-[10px] font-bold text-gray-500 uppercase">jkl</span>
</button>
<button class="keypad-button h-[46px] bg-white rounded-lg flex flex-col items-center justify-center shadow-[0_1px_0_0_rgba(0,0,0,0.3)] transition-colors" onclick="appendDigit('6')">
<span class="text-[25px] leading-none">6</span>
<span class="text-[10px] font-bold text-gray-500 uppercase">mno</span>
</button>
<!-- Row 3 -->
<button class="keypad-button h-[46px] bg-white rounded-lg flex flex-col items-center justify-center shadow-[0_1px_0_0_rgba(0,0,0,0.3)] transition-colors" onclick="appendDigit('7')">
<span class="text-[25px] leading-none">7</span>
<span class="text-[10px] font-bold text-gray-500 uppercase">pqrs</span>
</button>
<button class="keypad-button h-[46px] bg-white rounded-lg flex flex-col items-center justify-center shadow-[0_1px_0_0_rgba(0,0,0,0.3)] transition-colors" onclick="appendDigit('8')">
<span class="text-[25px] leading-none">8</span>
<span class="text-[10px] font-bold text-gray-500 uppercase">tuv</span>
</button>
<button class="keypad-button h-[46px] bg-white rounded-lg flex flex-col items-center justify-center shadow-[0_1px_0_0_rgba(0,0,0,0.3)] transition-colors" onclick="appendDigit('9')">
<span class="text-[25px] leading-none">9</span>
<span class="text-[10px] font-bold text-gray-500 uppercase">wxyz</span>
</button>
<!-- Row 4 -->
<div class="h-[46px]"></div>
<button class="keypad-button h-[46px] bg-white rounded-lg flex items-center justify-center shadow-[0_1px_0_0_rgba(0,0,0,0.3)] transition-colors" onclick="appendDigit('0')">
<span class="text-[25px]">0</span>
</button>
<button class="h-[46px] flex items-center justify-center active:opacity-50 transition-opacity" onclick="removeDigit()">
<span class="material-symbols-outlined text-[28px] text-on-surface">backspace</span>
</button>
</div>
</section>
<script>
        let currentCode = "";
        const maxCodeLength = 6;

        function updateDisplay() {
            for (let i = 0; i < maxCodeLength; i++) {
                const digitEl = document.getElementById(`digit-${i}`);
                if (i < currentCode.length) {
                    digitEl.innerText = currentCode[i];
                    digitEl.classList.remove('cursor-blink', 'border-primary');
                } else if (i === currentCode.length) {
                    digitEl.innerText = "";
                    digitEl.classList.add('cursor-blink');
                    // Simple visual cue for active slot
                } else {
                    digitEl.innerText = "";
                    digitEl.classList.remove('cursor-blink');
                }
            }

            if (currentCode.length === maxCodeLength) {
                // Simulate verification
                console.log("Verifying code:", currentCode);
                // In a real app, trigger API call here
                setTimeout(() => {
                    alert("Verifying SlyderChat Code: " + currentCode);
                    currentCode = "";
                    updateDisplay();
                }, 300);
            }
        }

        function appendDigit(digit) {
            if (currentCode.length < maxCodeLength) {
                currentCode += digit;
                updateDisplay();
                // Haptic feedback simulation could go here
            }
        }

        function removeDigit() {
            if (currentCode.length > 0) {
                currentCode = currentCode.slice(0, -1);
                updateDisplay();
            }
        }

        // Initialize display
        updateDisplay();
    </script>
</body></html>
