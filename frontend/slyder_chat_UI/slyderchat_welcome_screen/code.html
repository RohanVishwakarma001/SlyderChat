<style>
        body {
            background-color: #faf9fe;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="flex flex-col min-h-screen bg-surface">
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-between px-margin-edge pt-12 pb-safe">
<!-- Top Section: Illustration & Branding -->
<div class="w-full flex flex-col items-center space-y-12">
<div class="relative w-full max-w-[280px] aspect-square flex items-center justify-center">
<!-- Circular background glow -->
<div class="absolute inset-0 bg-primary-container/20 rounded-full blur-3xl scale-125"></div>
<!-- Main Illustration -->
<div class="relative w-full h-full rounded-full overflow-hidden animate-float">
<img class="w-full h-full object-cover" data-alt="SlyderChat Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaf04K4qURU6R642_DHjzSYTtyN_PcwrC9GRA86iG1PEGe6ZQg6ZDihfXN9zfi18liS-8_s7uPpWOvyvdQOfzJjUnfjr-Px3viOW3QlIcjgSmhYOufVxTwEm5-rgX3NRFG2SRn0VGo19foswqIyPOjnt9ZEPedegkSQVTjIkIo_oJlb4nmi4VdHXmsRgL_2cRtNoZthWeQQiiVeFBdl0C53DHWQIOWb-O63Yzyq8EGC5vgX9gf7rXq"/>
</div>
</div>
<div class="text-center space-y-4">
<h1 class="font-large-title text-large-title text-on-surface">
                    Welcome to SlyderChat
                </h1>
<p class="font-subheadline text-subheadline text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
                    A simple, reliable, and private way to use SlyderChat on your phone.
                </p>
</div>
</div>
<!-- Bottom Section: Legal & CTA -->
<div class="w-full flex flex-col items-center space-y-8 pb-10">
<!-- Legal Text -->
<div class="text-center px-4">
<p class="font-caption text-caption text-on-surface-variant leading-relaxed">
                    Read our <a class="text-primary font-medium hover:underline transition-all" href="#">Privacy Policy</a>. Tap "Agree &amp; Continue" to accept the <a class="text-primary font-medium hover:underline transition-all" href="#">Terms of Service</a>.
                </p>
</div>
<!-- Primary Action Button -->
<button class="w-full max-w-[340px] h-[52px] bg-primary-container text-on-primary-container font-headline text-headline rounded-[14px] shadow-sm active:scale-95 transition-transform duration-100 flex items-center justify-center">
                Agree &amp; Continue
            </button>
<!-- Language Selector (Optional iOS Pattern) -->
<button class="flex items-center space-x-1 text-on-surface-variant/80 font-subheadline text-subheadline active:opacity-60 transition-opacity">
<span class="material-symbols-outlined text-[18px]">language</span>
<span>English</span>
<span class="material-symbols-outlined text-[18px]">expand_more</span>
</button>
</div>
</main>
<!-- Interactive Layer for Feedback -->
<script>
        document.querySelector('button').addEventListener('click', function() {
            // Haptic feedback simulation
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
            console.log('Agree & Continue Pressed');
        });
    </script>
</body></html>
