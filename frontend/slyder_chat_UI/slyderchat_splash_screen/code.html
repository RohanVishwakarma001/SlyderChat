<style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .ios-status-bar {
            height: 44px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .status-left {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .status-right {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        /* Entrance Animation for Logos */
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .animate-splash {
            animation: fadeInScale 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .meta-container {
            position: fixed;
            bottom: 60px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .from-text {
            font-size: 14px;
            color: #8e8e93; /* standard iOS secondary label */
            letter-spacing: -0.1px;
        }

        /* Ripple effect background micro-interaction */
        .ripple-bg {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(37, 211, 102, 0.03) 0%, rgba(255, 255, 255, 0) 70%);
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="flex flex-col items-center justify-center min-h-screen font-body bg-white">
<!-- iOS Status Bar Placeholder -->
<div class="ios-status-bar text-black">
<div class="status-left" id="clock">9:41</div>
<div class="status-right">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[20px]">battery_full</span>
</div>
</div>
<!-- Background Atmospheric Effect -->
<div class="ripple-bg"></div>
<!-- Main Content Container -->
<main class="flex flex-col items-center justify-center flex-grow">
<!-- SlyderChat Logo Center -->
<div class="animate-splash flex flex-col items-center">
<div class="w-24 h-24 flex items-center justify-center">
<img alt="SlyderChat Logo" class="w-full h-full object-contain drop-shadow-sm rounded-xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaf04K4qURU6R642_DHjzSYTtyN_PcwrC9GRA86iG1PEGe6ZQg6ZDihfXN9zfi18liS-8_s7uPpWOvyvdQOfzJjUnfjr-Px3viOW3QlIcjgSmhYOufVxTwEm5-rgX3NRFG2SRn0VGo19foswqIyPOjnt9ZEPedegkSQVTjIkIo_oJlb4nmi4VdHXmsRgL_2cRtNoZthWeQQiiVeFBdl0C53DHWQIOWb-O63Yzyq8EGC5vgX9gf7rXq"/>
</div>
</div>
</main>
<!-- Bottom Footer Brand -->
<div class="meta-container animate-splash" style="animation-delay: 0.3s; opacity: 0;">
<span class="from-text font-caption">from</span>
<div class="flex items-center gap-1.5">
<!-- Meta Logo Representation -->
<svg fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 17C14.7614 17 17 14.7614 17 12C17 9.23858 14.7614 7 12 7C9.23858 7 7 9.23858 7 12C7 14.7614 9.23858 17 12 17Z" fill="#0064E0"></path>
<path d="M12 19C15.866 19 19 15.866 19 12C19 8.13401 15.866 5 12 5C8.13401 5 5 8.13401 5 12C5 15.866 8.13401 19 12 19ZM12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12C21 16.9706 16.9706 21 12 21Z" fill="#0064E0" fill-opacity="0.1"></path>
</svg>
<span class="font-headline tracking-widest text-[#0064E0]" style="font-size: 18px; font-weight: 700;">Meta</span>

<!-- Script for interactive elements and real-time clock -->
<script>
        // Update the clock to match current time
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Optional: simulate transition after delay
        /*
        setTimeout(() => {
            document.body.style.transition = 'opacity 0.5s ease-out';
            document.body.style.opacity = '0';
        }, 2500);
        */

        // Micro-interaction: logo pulse
        document.addEventListener('DOMContentLoaded', () => {
            const logo = document.querySelector('.animate-splash');
            logo.addEventListener('click', () => {
                logo.style.transition = 'transform 0.1s ease';
                logo.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    logo.style.transform = 'scale(1)';
                }, 100);
            });
        });
    </script>
</body></html>
