server:
  port: ${PORT:8080}

spring:
  # Loads backend/.env if present (local dev only — gitignored, never bundled
  # into the Docker image). `optional:` means nothing breaks if it's missing,
  # e.g. on Render, which supplies these via real env vars instead.
  config:
    import: optional:file:.env[.properties]

  application:
    name: chatapp

  datasource:
    # NeonDB Postgres JDBC URL. Example:
    # jdbc:postgresql://ep-xxxx-xxxx.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
    url: ${DB_URL:jdbc:postgresql://REPLACE_ME.neon.tech/neondb?sslmode=require}
    username: ${DB_USERNAME:REPLACE_ME}
    password: ${DB_PASSWORD:REPLACE_ME}
    hikari:
      maximum-pool-size: 5
      # NeonDB's free tier suspends the compute (and drops connections) after a period of
      # idleness. Without these, HikariCP can hand out a pooled connection that Neon has
      # already killed server-side, surfacing as an intermittent 500 on any endpoint.
      # max-lifetime/idle-timeout retire connections before they go stale; keepalive-time
      # pings idle connections so dead ones are detected and replaced proactively instead
      # of failing the next real query.
      max-lifetime: 270000
      idle-timeout: 240000
      keepalive-time: 30000
      connection-timeout: 30000
      validation-timeout: 5000
      # DB_URL points at Neon's pooled endpoint (PgBouncer-style transaction pooling).
      # That's incompatible with pgjdbc's server-side prepared-statement cache: a
      # connection can get silently handed to a different backend session than the one
      # that prepared a statement, so a schema/plan change on one session doesn't
      # invalidate what another session has cached - surfacing as "cached plan must
      # not change result type". prepareThreshold=0 keeps pgjdbc on client-side
      # prepare only, which is the standard fix for JDBC drivers behind PgBouncer.
      data-source-properties:
        prepareThreshold: 0

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

app:
  jwt:
    # Must be 32+ chars (HS256 key material)
    secret: ${JWT_SECRET:REPLACE_ME_WITH_A_LONG_RANDOM_SECRET_32_CHARS_MIN}
    expiration-ms: 2592000000 # 30 days

  otp:
    dev-mode: true
    expiry-minutes: 5
    max-attempts: 5

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:REPLACE_ME}
    api-key: ${CLOUDINARY_API_KEY:REPLACE_ME}
    api-secret: ${CLOUDINARY_API_SECRET:REPLACE_ME}
    folder: chatapp

logging:
  level:
    com.rohan.chatapp: DEBUG
    org.springframework.web.socket: INFO
